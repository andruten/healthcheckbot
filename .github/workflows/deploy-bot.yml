name: Build and Push Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "**"
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Lint and test
        run: |
          ruff check src/
          ruff format src/ --check
          PYTHONPATH=src python -m pytest tests/ -v --tb=short

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.juanmadiaz.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: registry.juanmadiaz.com/apps/healthcheckbot
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  notify-infra:
    needs: build-and-push
    if: >
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - id: infra-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.K8S_INFRA_APP_ID }}
          private-key: ${{ secrets.K8S_INFRA_APP_PRIVATE_KEY }}
          owner: torgus
          repositories: k8s-infra

      - uses: actions/github-script@v7
        with:
          github-token: ${{ steps.infra-token.outputs.token }}
          script: |
            const tag = context.payload.release?.tag_name ??
              context.ref.replace("refs/tags/", "");

            await github.rest.repos.createDispatchEvent({
              owner: "torgus",
              repo: "k8s-infra",
              event_type: "image-published",
              client_payload: {
                app: "healthcheckbot",
                tag,
              },
            });
